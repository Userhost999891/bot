name: NMC-Nagroda
version: '2.1'
main: pl.naris.nagroda.NagrodaPlugin
api-version: '1.21'
author: kavan
description: Plugin nagród za weryfikację Discord i wykonywanie komend z Discorda — łączy się z MySQL i NarisMC Core Bot

commands:
  nagroda:
    description: Zarządzanie pluginem nagród
    usage: /nagroda <setup|setupreward|reload|info>
    permission: nagroda.admin
    aliases: [reward]
  admindiscord:
    description: Zarządzanie połączeniem z botem Discord
    usage: /admindiscord <clink|status|setupreward>
    permission: nagroda.admin

permissions:
  nagroda.admin:
    description: Pozwala na zarządzanie pluginem nagród
    default: op
